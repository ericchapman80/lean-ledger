name: Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!ROADMAP.md'

  validate:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lean_ledger
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lean_ledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/lean_ledger
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js','**/*.jsx','**/*.mjs') }}
          restore-keys: nextjs-${{ runner.os }}-

      - run: npm run migrate-db

      - run: npm run test:coverage

      - run: npm run build

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage
          retention-days: 14

  security-audit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm audit --audit-level=high

  workflow-lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  local-functional:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lean_ledger
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lean_ledger"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: true
      AUTH_ENABLED: 'false'
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/lean_ledger
      PLAYWRIGHT_ALLOW_MUTATION: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js','**/*.jsx','**/*.mjs') }}
          restore-keys: nextjs-${{ runner.os }}-

      - run: npm run migrate-db

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - run: npm run build

      - name: Start app
        run: npm run start -- --hostname 127.0.0.1 > /tmp/lean-ledger.log 2>&1 &

      - name: Wait for app
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            echo "App not ready yet (attempt $attempt/30)"
            sleep 2
          done
          echo "App failed to start"
          cat /tmp/lean-ledger.log
          exit 1

      - run: npm run smoke -- http://127.0.0.1:3000

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: local-functional-logs
          path: |
            /tmp/lean-ledger.log
            playwright-report
            test-results
          retention-days: 7

  quality-gate:
    needs: [changes, validate, local-functional, security-audit, workflow-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify quality gates
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          LOCAL_FUNCTIONAL_RESULT: ${{ needs['local-functional'].result }}
          SECURITY_AUDIT_RESULT: ${{ needs['security-audit'].result }}
          WORKFLOW_LINT_RESULT: ${{ needs['workflow-lint'].result }}
        run: |
          echo "changes: $CHANGES_RESULT (code=$CODE_CHANGED)"
          echo "validate: $VALIDATE_RESULT"
          echo "local-functional: $LOCAL_FUNCTIONAL_RESULT"
          echo "security-audit: $SECURITY_AUDIT_RESULT"
          echo "workflow-lint: $WORKFLOW_LINT_RESULT"

          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "The changes filter did not complete successfully."
            exit 1
          fi

          if [ "$CODE_CHANGED" != "true" ]; then
            echo "Docs-only change; heavy quality gates intentionally skipped."
            exit 0
          fi

          if [ "$VALIDATE_RESULT" != "success" ] \
            || [ "$LOCAL_FUNCTIONAL_RESULT" != "success" ] \
            || [ "$SECURITY_AUDIT_RESULT" != "success" ] \
            || [ "$WORKFLOW_LINT_RESULT" != "success" ]; then
            echo "One or more required quality gates failed, were cancelled, or were skipped."
            exit 1
          fi

          echo "All quality gates passed"

  deploy-preview:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft && needs.changes.outputs.code == 'true'
    needs: [changes, quality-gate]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Normalize preview database env
        shell: bash
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          if [ -z "${DATABASE_URL:-}" ] && [ -n "${POSTGRES_URL:-}" ]; then
            export DATABASE_URL="$POSTGRES_URL"
          fi
          if [ -z "${DATABASE_URL_UNPOOLED:-}" ] && [ -n "${POSTGRES_URL_NON_POOLING:-}" ]; then
            export DATABASE_URL_UNPOOLED="$POSTGRES_URL_NON_POOLING"
          fi
          {
            echo "DATABASE_URL=$DATABASE_URL"
            echo "DATABASE_URL_UNPOOLED=${DATABASE_URL_UNPOOLED:-}"
          } >> "$GITHUB_ENV"
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Preview DATABASE_URL is not available after Vercel env pull."
            exit 1
          fi

      - name: Migrate preview database
        run: npm run migrate-db

      - name: Build preview deployment
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        shell: bash
        run: |
          url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: $url" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  preview-post-deploy:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: deploy-preview
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.deployment-url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Note missing preview bypass secret
        if: env.VERCEL_AUTOMATION_BYPASS_SECRET == ''
        run: |
          echo "Skipping protected preview smoke/E2E checks because VERCEL_AUTOMATION_BYPASS_SECRET is not configured in GitHub Actions." >> "$GITHUB_STEP_SUMMARY"

      - if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        run: npx playwright install --with-deps chromium

      - name: Wait for preview deployment reachability
        if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        shell: bash
        run: |
          for attempt in {1..24}; do
            if curl -fsS \
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
              -H "x-vercel-set-bypass-cookie: true" \
              "${PLAYWRIGHT_BASE_URL}/api/health" >/dev/null; then
              exit 0
            fi
            echo "Preview deployment not reachable yet (attempt $attempt/24)"
            sleep 5
          done
          echo "Preview deployment did not become reachable in time."
          exit 1

      - if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        run: npm run smoke -- "${PLAYWRIGHT_BASE_URL}" --read-only

      - if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        run: npm run test:e2e:readonly

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: preview-post-deploy-results
          path: |
            playwright-report
            test-results
          retention-days: 7

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true'
    needs: [changes, quality-gate]
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
      target-url: ${{ steps.target.outputs.url }}
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Normalize production database env
        shell: bash
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          if [ -z "${DATABASE_URL:-}" ] && [ -n "${POSTGRES_URL:-}" ]; then
            export DATABASE_URL="$POSTGRES_URL"
          fi
          if [ -z "${DATABASE_URL_UNPOOLED:-}" ] && [ -n "${POSTGRES_URL_NON_POOLING:-}" ]; then
            export DATABASE_URL_UNPOOLED="$POSTGRES_URL_NON_POOLING"
          fi
          if [ -z "${DATABASE_URL:-}" ] && [ -n "${PROD_DATABASE_URL:-}" ]; then
            export DATABASE_URL="$PROD_DATABASE_URL"
          fi
          {
            echo "DATABASE_URL=$DATABASE_URL"
            echo "DATABASE_URL_UNPOOLED=${DATABASE_URL_UNPOOLED:-}"
          } >> "$GITHUB_ENV"
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Production DATABASE_URL is not available after Vercel env pull or PROD_DATABASE_URL fallback."
            exit 1
          fi

      - name: Migrate production database
        run: npm run migrate-db

      - name: Build production deployment
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production
        id: deploy
        shell: bash
        run: |
          url=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $url" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Resolve production test URL
        id: target
        shell: bash
        run: |
          url="${{ vars.PRODUCTION_BASE_URL }}"
          if [ -z "$url" ]; then
            url="${{ steps.deploy.outputs.url }}"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production verification URL: $url" >> "$GITHUB_STEP_SUMMARY"

  production-post-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      PLAYWRIGHT_BASE_URL: ${{ needs.deploy-production.outputs.target-url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Note missing production bypass secret
        if: env.VERCEL_AUTOMATION_BYPASS_SECRET == ''
        run: |
          echo "Skipping protected production smoke/E2E checks because VERCEL_AUTOMATION_BYPASS_SECRET is not configured in GitHub Actions." >> "$GITHUB_STEP_SUMMARY"

      - if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        run: npx playwright install --with-deps chromium

      - name: Wait for production deployment reachability
        if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        shell: bash
        run: |
          for attempt in {1..24}; do
            if curl -fsS \
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
              -H "x-vercel-set-bypass-cookie: true" \
              "${PLAYWRIGHT_BASE_URL}/api/health" >/dev/null; then
              exit 0
            fi
            echo "Production deployment not reachable yet (attempt $attempt/24)"
            sleep 5
          done
          echo "Production deployment did not become reachable in time."
          exit 1

      - if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        run: npm run smoke -- "${PLAYWRIGHT_BASE_URL}" --read-only

      - if: env.VERCEL_AUTOMATION_BYPASS_SECRET != ''
        run: npm run test:e2e:readonly

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: production-post-deploy-results
          path: |
            playwright-report
            test-results
          retention-days: 7
