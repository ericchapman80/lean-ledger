name: Database Backup

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-production-db:
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - name: Export production database
        shell: bash
        run: |
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          filename="lean-ledger-prod-${timestamp}.dump"
          docker run --rm \
            -v "$PWD:/backup" \
            postgres:17 \
            pg_dump "$PROD_DATABASE_URL" \
              --format=custom \
              --no-owner \
              --no-privileges \
              --file="/backup/$filename"
          sha256sum "$filename" > "${filename}.sha256"
          echo "BACKUP_FILE=$filename" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.BACKUP_FILE }}.sha256
          retention-days: 30
